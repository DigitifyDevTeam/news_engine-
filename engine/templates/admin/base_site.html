{% extends "admin/base_site.html" %}

{% block extrastyle %}
{{ block.super }}
<style>
    /* Fix for Python 3.14 compatibility issues */
    .object-tools {
        margin: 0 0 10px 0;
        padding: 0;
        list-style: none;
    }
    .object-tools li {
        display: inline-block;
        margin-right: 10px;
    }
    .object-tools a {
        display: inline-block;
        padding: 4px 8px;
        background: #79aec8;
        color: white;
        text-decoration: none;
        border-radius: 4px;
    }
    .object-tools a:hover {
        background: #68a0b8;
    }
</style>
{% endblock %}
