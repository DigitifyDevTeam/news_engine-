services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: engine
      POSTGRES_PASSWORD: engine
      POSTGRES_DB: news_engine
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engine -d news_engine"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: gunicorn --bind 0.0.0.0:8000 engine.wsgi:application
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: engine.settings.production
      DATABASE_URL: postgres://engine:engine@db:5432/news_engine
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./engine:/app/engine
      - ./prompts:/app/prompts
    ports:
      - "8000:8000"
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A engine.celery worker -l info
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: engine.settings.production
      DATABASE_URL: postgres://engine:engine@db:5432/news_engine
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./engine:/app/engine
      - ./prompts:/app/prompts
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      web: { condition: service_started }

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A engine.celery beat -l info
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: engine.settings.production
      DATABASE_URL: postgres://engine:engine@db:5432/news_engine
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./engine:/app/engine
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      worker: { condition: service_started }

volumes:
  pgdata:
